services:
  postgres:
    image: postgres:16
    container_name: fenix_facturacion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fenix
      POSTGRES_PASSWORD: fenix_dev_password
      POSTGRES_DB: fenix_facturacion
    ports:
      - "5432:5432"
    volumes:
      - fenix_facturacion_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_facturacion_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: pnpm start:dev
    depends_on:
      - postgres

volumes:
  fenix_facturacion_postgres_data: