services:
  postgres:
    image: postgres:16
    container_name: fenix_facturacion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fenix
      POSTGRES_PASSWORD: fenix_dev_password
      POSTGRES_DB: fenix_facturacion
    ports:
      - "5432:5432"
    volumes:
      - fenix_facturacion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fenix -d fenix_facturacion"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fenix_facturacion_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma generate && pnpm start:dev"
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_started

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: fenix_facturacion_ocr
    restart: unless-stopped
    ports:
      - "8000:8000"

volumes:
  fenix_facturacion_postgres_data:
